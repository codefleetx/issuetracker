components:
  schemas:
    IssueAttachmentRead:
      type: object
      description: Deterministic representation of an Issue attachment.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Universally unique identifier for this record.
        number:
          type: integer
          readOnly: true
          description: Sequential human-friendly identifier for this attachment.
        issue:
          type: string
          format: uuid
          description: Issue this attachment belongs to.
          readOnly: true
        comment:
          type: string
          format: uuid
          description: Optional comment this attachment belongs to.
          readOnly: true
          nullable: true
        file:
          type: string
          format: uri
          readOnly: true
          description: Uploaded file.
        original_name:
          type: string
          readOnly: true
          description: Original filename at upload time.
        size:
          type: integer
          readOnly: true
          description: File size in bytes.
        uploaded_by_user_id:
          type: integer
          readOnly: true
          nullable: true
          description: Optional user ID from host application identity system.
        uploaded_by_email:
          type: string
          format: email
          readOnly: true
          description: Email address of the uploader.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was last updated.
      required:
      - comment
      - created_at
      - file
      - id
      - issue
      - number
      - original_name
      - size
      - updated_at
      - uploaded_by_email
      - uploaded_by_user_id
    IssueAttachmentUpload:
      type: object
      description: Serializer for uploading attachments.
      properties:
        issue:
          type: integer
          description: Issue number (not UUID).
        comment:
          type: string
          format: uuid
          description: Optional comment this attachment belongs to.
          nullable: true
        file:
          type: string
          format: uri
          description: Uploaded file.
      required:
      - file
      - issue
    IssueCommentCreate:
      type: object
      description: Serializer for creating new comments.
      properties:
        issue:
          type: integer
          description: Issue number (not UUID).
        body:
          type: string
          description: Comment content in markdown or plain text.
          maxLength: 10000
        commenter_email:
          type: string
          format: email
          description: Required for anonymous users.
        files:
          type: array
          items:
            type: string
            format: uri
          writeOnly: true
          description: Optional files to attach to this comment.
      required:
      - body
      - issue
    IssueCommentRead:
      type: object
      description: Deterministic representation of an Issue comment.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Universally unique identifier for this record.
        number:
          type: integer
          readOnly: true
          description: Sequential human-friendly identifier for this comment.
        issue:
          type: string
          format: uuid
          description: The issue this comment belongs to.
          readOnly: true
        body:
          type: string
          readOnly: true
          description: Comment content in markdown or plain text.
        commenter_email:
          type: string
          format: email
          readOnly: true
          description: Email address of the commenter.
        commenter_user_id:
          type: integer
          readOnly: true
          nullable: true
          description: Optional user ID from host application identity system.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when this record was created.
        updated_at:
          type: string
          format: date-time
          readOnly: true

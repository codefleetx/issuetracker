  /api/v1/issues/{id}/change-status/:
    post:
      operationId: api_v1_issues_change_status_create
      description: |-
        Change issue status using lifecycle service.

        Delegates:
            - Transition validation
            - Policy enforcement
            - Atomic DB update
            - Status history creation
            - Signal dispatch
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: Universally unique identifier for this record.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueStatusUpdate'
          application/x-www-form-urlencoded:
            schema:

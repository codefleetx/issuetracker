  /api/v1/issues/:
    get:
      operationId: issue_crud_list
      description: |-
        Write-capable ViewSet for Issue.

        Responsibilities:
            - Create issues
            - Update issues
            - Soft delete issues

        Read operations are also available here,
        but a dedicated read-only ViewSet exists
        for strict architectural separation.
      summary: List issues (write-capable endpoint)
      tags:
      - Issue
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IssueRead'
          description: ''
    post:
      operationId: issue_create
      description: |-
        Write-capable ViewSet for Issue.

        Responsibilities:
            - Create issues
            - Update issues
            - Soft delete issues

        Read operations are also available here,
        but a dedicated read-only ViewSet exists
        for strict architectural separation.
      summary: Create new issue
      tags:
      - Issue
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/IssueCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/IssueCreate'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueCreate'
          description: ''

          description: No response body
  /api/v1/comments/:
    get:
      operationId: comment_crud_list
      description: |-
        Base class for write-capable endpoints.

        Requirements:
            - Must define `read_serializer_class`
            - Must define `write_serializer_class`
            - Must define `queryset`
      summary: List comments (write-capable endpoint)
      tags:
      - Comment
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IssueCommentRead'
          description: ''
    post:
      operationId: comment_create
      description: |-
        Creates a new comment.

        Supports atomic comment + attachment creation when submitted as multipart/form-data.

        If any attachment fails validation, the entire transaction is rolled back.
      summary: Create comment (supports atomic file upload)
      tags:
      - Comment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueCommentCreate'
            examples:
              MultipartCommentWithAttachments:
                value:
                  issue: 15
                  body: Here are the logs.
                  files:
                  - error.log
                  - trace.txt
                summary: Create comment with files
                description: Atomic comment + attachment creation.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/IssueCommentCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/IssueCommentCreate'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueCommentCreate'
              examples:
                MultipartCommentWithAttachments:
                  value:
                    issue: 15
                    body: Here are the logs.
                    files:
                    - error.log
                    - trace.txt
                  summary: Create comment with files
                  description: Atomic comment + attachment creation.
          description: ''

openapi: 3.0.3
info:
  title: Generic Issue Tracker API (Dev)
  version: v1
paths:
  /api/v1/attachments/:
    get:
      operationId: attachment_crud_list
      description: |-
        Base class for write-capable endpoints.

        Requirements:
            - Must define `read_serializer_class`
            - Must define `write_serializer_class`
            - Must define `queryset`
      summary: List attachments (write-capable endpoint)
      tags:
      - Attachment
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IssueAttachmentRead'
          description: ''
    post:
      operationId: attachment_create
      description: |-
        Uploads a file attachment.

        Attachment may optionally belong to a specific comment.
        Uploader identity is automatically injected.
      summary: Upload attachment
      tags:
      - Attachment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueAttachmentUpload'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/IssueAttachmentUpload'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/IssueAttachmentUpload'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssueAttachmentUpload'
          description: ''
  /api/v1/attachments-read/:
    get:
      operationId: attachment_read_list
      description: |-
        Base class for read-only endpoints.

        Requirements:
            - Must define `read_serializer_class`
            - Must define `queryset`
      summary: List attachments (read-only)

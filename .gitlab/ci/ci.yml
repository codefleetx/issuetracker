# IssueTracker CI
# Runs on every push and MR — lint and test

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

stages:
  - test

test:
  stage: test
  image: python:3.11

  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

  cache:
    key: pip-issuetracker-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip

  before_script:
    - pip install -e ".[dev]"

  script:
    - ruff check .
